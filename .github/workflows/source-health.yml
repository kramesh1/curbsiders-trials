name: Source health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * 1"

jobs:
  live-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Verify official RSS discovery
        run: python scripts/scrape_episodes.py --dry-run --refresh-recent 1
